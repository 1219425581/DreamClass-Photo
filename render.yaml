services:
  - type: web
    name: dreamclass-photo
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: IMAGE_API_PROVIDER
        value: siliconflow
      - key: ACCESS_CONTROL_MODE
        value: campus_ip
      - key: CAMPUS_ALLOWED_CIDRS
        value: 222.204.0.0/18,210.35.240.0/20,218.64.56.8/32,2001:250:6c00::/48,39.161.242.0/24
      - key: CAMPUS_ALLOW_PRIVATE_IPS
        value: "false"
      - key: TRUST_PROXY_HEADERS
        value: "true"
